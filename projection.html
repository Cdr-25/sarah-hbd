<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --rose:#e8809e; --rose-deep:#c9527a; --rose-pale:#fce8ef;
  --white:#ffffff; --blush:#fbe4ea;
  --bg:#1a0e13;
  --emoji-fonts:'Apple Color Emoji','Segoe UI Emoji','Noto Color Emoji',sans-serif;
}
html,body{
  width:100%;height:100%;
  background:var(--bg);
  overflow:hidden;
  font-family:'Jost',var(--emoji-fonts),sans-serif;
}

/* ── PARTICLES ── */
#canvas{position:fixed;inset:0;z-index:0;pointer-events:none}
.bg-glow{
  position:fixed;inset:0;z-index:0;
  background:
    radial-gradient(ellipse 70% 55% at 20% 15%, rgba(232,128,158,.3) 0%, transparent 60%),
    radial-gradient(ellipse 70% 55% at 85% 85%, rgba(201,82,122,.22) 0%, transparent 60%),
    linear-gradient(160deg,#2c1420 0%,#1a0e13 60%,#241119 100%);
  pointer-events:none;
}

/* ── TICKER ── */
.ticker{
  position:fixed;top:0;left:0;right:0;z-index:10;
  height:38px;overflow:hidden;
  background:linear-gradient(90deg,var(--rose-deep),var(--rose),var(--rose-deep));
  display:flex;align-items:center;
  box-shadow:0 4px 20px rgba(0,0,0,.35);
}
.ticker-track{
  display:flex;width:max-content;
  animation:ticker 32s linear infinite;
  font-family:'Jost',var(--emoji-fonts),sans-serif;
}
.ticker-track span{
  display:inline-flex;align-items:center;gap:10px;
  color:#fff;font-weight:800;font-size:.68rem;
  letter-spacing:.2em;text-transform:uppercase;
  padding:0 30px;white-space:nowrap;
  text-shadow:0 1px 3px rgba(0,0,0,.25);
}
@keyframes ticker{ from{transform:translateX(0)} to{transform:translateX(-50%)} }

/* ── COUNTER ── */
.msg-counter{
  position:fixed;top:52px;right:32px;z-index:10;
  font-size:.72rem;font-weight:700;letter-spacing:.2em;text-transform:uppercase;
  color:rgba(252,232,239,.55);
}

/* ── SLIDES ── */
.slide{
  position:fixed;inset:0;z-index:2;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:56px 70px;
  opacity:0;
  transition:opacity 1.2s ease;
  pointer-events:none;
  text-align:center;
}
.slide.active{ opacity:1;pointer-events:auto; }
.slide.no-transition{ transition:none !important; }

/* ── INTRO ── */
.intro-crown{
  font-size:clamp(3.5rem,9vw,7rem);
  animation:float 3s ease-in-out infinite;
  margin-bottom:20px;
  font-family:var(--emoji-fonts);
}
@keyframes float{0%,100%{transform:translateY(0) rotate(-5deg)}50%{transform:translateY(-16px) rotate(5deg)}}
.intro-eyebrow{
  font-size:clamp(.65rem,1.5vw,1rem);
  letter-spacing:.35em;text-transform:uppercase;
  color:rgba(232,128,158,.75);
  margin-bottom:18px;
}
.intro-title{
  font-family:'Playfair Display',serif;
  font-size:clamp(2.3rem,6.5vw,5.5rem);
  font-weight:900;line-height:1.3;
  padding-bottom:.15em;
  background:linear-gradient(140deg,var(--white) 0%,var(--blush) 45%,var(--white) 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  margin-bottom:14px;
}
.intro-title .rose-accent{
  background:linear-gradient(140deg,var(--rose-deep),var(--rose),var(--rose-pale));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.intro-divider{
  display:flex;align-items:center;gap:16px;
  margin:22px auto;width:min(500px,80vw);
}
.intro-divider-line{ flex:1;height:1px;background:linear-gradient(90deg,transparent,rgba(232,128,158,.55),transparent); }
.intro-divider-star{ color:var(--rose); font-size:1.2rem; }
.intro-message{
  font-family:'Playfair Display',serif;
  font-size:clamp(1.5rem,3.6vw,2.5rem);
  font-style:italic;font-weight:700;
  color:rgba(255,255,255,.92);
  line-height:1.5;
  max-width:800px;
}

/* ── MESSAGE SLIDE ── */
.msg-from{
  font-size:clamp(.68rem,1.6vw,1rem);
  letter-spacing:.3em;text-transform:uppercase;
  color:rgba(232,128,158,.7);
  margin-bottom:8px;
}
.msg-name{
  font-family:'Playfair Display',serif;
  font-weight:900;
  background:linear-gradient(130deg,var(--rose-deep),var(--rose),var(--rose-pale));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  line-height:1.3;
  padding-bottom:.15em;
  transition:font-size .25s ease, margin .25s ease;
  font-size:clamp(2.2rem,6vw,4.6rem);
  margin-bottom:26px;
}
.msg-ornament{
  display:flex;align-items:center;gap:16px;
  width:min(560px,80vw);margin:0 auto 26px;
  transition:margin .25s ease;
}
.msg-ornament-line{ flex:1;height:1px;background:linear-gradient(90deg,transparent,rgba(232,128,158,.5),transparent); }
.msg-ornament-icon{ color:var(--rose); font-size:1.3rem; font-family:var(--emoji-fonts); }
.msg-quote-icon{
  font-family:'Playfair Display',serif;
  font-size:clamp(3.5rem,7vw,6rem);
  color:rgba(232,128,158,.22);
  line-height:.7;
  margin-bottom:4px;
  transition:opacity .2s ease;
}
.msg-body{
  font-family:'Playfair Display',serif,var(--emoji-fonts);
  font-weight:700;font-style:italic;
  line-height:1.45;
  max-width:920px;
  width:100%;
  color:#fdf3f6; /* couleur pleine (pas de dégradé) pour préserver la couleur native des émojis */
  font-size:clamp(1.4rem,3.8vw,3rem);
  max-height:calc(100vh - 300px);
  overflow:hidden;
}
@keyframes kenburns{ from{transform:scale(1.05);} to{transform:scale(1.16);} }

/* Photo en fond plein écran pour tout le monde : la photo du message
   (ou celle de Sarah par défaut si l'invité n'en a pas) occupe tout l'écran,
   légèrement assombrie pour garder le texte lisible. */
.photo-ambient{
  position:fixed;inset:0;z-index:1;
  background-size:cover;background-position:center 22%;
  filter:saturate(1.08) brightness(.62);
  animation:kenburns 16s ease-in-out infinite alternate;
  opacity:0;
  transition:opacity 1.1s ease;
  pointer-events:none;
}
.photo-ambient.show{ opacity:1; }

/* Photo NETTE et INTÉGRALE, jamais recadrée : contrairement au fond flouté
   ci-dessus (qui remplit tout l'écran quitte à couper les bords), cette
   couche affiche la photo en entier ("contain"), pour être certain qu'on
   voit toujours TOUT LE MONDE sur la photo — l'invité ET la personne qu'il
   tient dans ses bras par exemple — peu importe le cadrage d'origine. */
.photo-full{
  position:fixed;inset:0;z-index:1;
  background-size:contain;
  background-repeat:no-repeat;
  background-position:center;
  opacity:0;
  transition:opacity 1.1s ease;
  pointer-events:none;
}
.photo-full.show{ opacity:1; }

/* Voile sombre permanent par-dessus l'écho photo : garantit la lisibilité
   du texte même si la photo d'origine est très claire/lumineuse. */
.ambient-veil{
  position:fixed;inset:0;z-index:1;
  background:radial-gradient(ellipse 65% 60% at 50% 55%, rgba(26,14,19,.55) 0%, rgba(26,14,19,.8) 100%);
  opacity:0;
  transition:opacity 1.4s ease;
  pointer-events:none;
}
.ambient-veil.show{ opacity:1; }

/* ── EMPTY STATE ── */
.empty-message{
  font-family:'Playfair Display',serif;
  font-size:clamp(1.3rem,3vw,2rem);
  font-style:italic;
  color:rgba(252,232,239,.75);
}

/* ── PROGRESS BAR ── */
.progress-bar{
  position:fixed;bottom:0;left:0;right:0;z-index:10;
  height:4px;
  background:rgba(232,128,158,.15);
}
.progress-fill{
  height:100%;width:0%;
  background:linear-gradient(90deg,var(--rose-deep),var(--rose),var(--rose-pale));
  transition:width linear;
}

/* ── BARRE DE CONTRÔLE (discrète, coin bas-gauche) ── */
.control-bar{
  position:fixed;bottom:24px;left:24px;z-index:11;
  display:flex;align-items:center;gap:10px;
  opacity:.32;
  transition:opacity .35s ease;
}
.control-bar:hover{ opacity:1; }
.ctrl-btn{
  width:36px;height:36px;border-radius:50%;
  background:rgba(255,255,255,.08);
  border:1px solid rgba(255,255,255,.22);
  color:#fff;font-size:.95rem;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;backdrop-filter:blur(6px);
  transition:background .2s ease, transform .2s ease;
}
.ctrl-btn:hover{ background:rgba(255,255,255,.22); transform:scale(1.08); }
.ctrl-btn:active{ transform:scale(.92); }
.ctrl-btn.ctrl-replay{ width:42px;height:42px;font-size:1.15rem; }
</style>

<script>
/* ═══ CONFIG ═══ */
const SUPABASE_URL = 'https://xbthhseeqidsnmvnfaya.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhidGhoc2VlcWlkc25tdm5mYXlhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk3ODI5MzgsImV4cCI6MjA5NTM1ODkzOH0.tQrDeZHY5GwnoUq47T8JWalpJBC0bzfaCZzF3z5jU1I';
const REFRESH_MS    = 20000;   // resynchro toutes les 20s
const CACHE_KEY      = 'sarah_projection_cache';
const INTRO_DURATION = 6500;   // durée de l'écran d'intro

/* ═══ VOIX OFF (lecture des messages à voix haute) ═══
   Utilise l'API native du navigateur (SpeechSynthesis), gratuite et sans
   backend. La voix est ACTIVE par défaut. Les navigateurs bloquant tout
   son avant une interaction humaine, on tente de parler immédiatement au
   chargement ET on relance la lecture automatiquement dès la toute
   première interaction de l'utilisateur (clic, appui, touche), sans qu'il
   ait besoin de toucher au bouton 🔊/🔇 — qui reste là pour couper le son
   si besoin. */
let voiceEnabled = true;
let frVoice = null;
let speechUnlocked = false;
function pickFrenchVoice(){
  const voices = window.speechSynthesis ? speechSynthesis.getVoices() : [];
  const frVoices = voices.filter(v => /fr/i.test(v.lang));
  // Priorité absolue aux voix LOCALES (embarquées sur l'appareil) : elles ne
  // dépendent d'aucune connexion internet et ne peuvent donc jamais ralentir,
  // couper ou sauter une phrase à cause d'un réseau faible ou instable —
  // contrairement aux voix "réseau" (ex. "Google français") que Chrome
  // propose souvent en premier par défaut mais qui appellent un serveur
  // distant pour chaque phrase.
  frVoice = frVoices.find(v => v.localService) || frVoices[0]
         || voices.find(v => v.localService) || voices[0] || null;
}
if (window.speechSynthesis){
  pickFrenchVoice();
  speechSynthesis.onvoiceschanged = pickFrenchVoice;
}
// Retire les emoji (et symboles pictographiques) avant lecture : la voix
// off ne doit lire que du texte, jamais "cœur rouge" ou "visage qui rit".
function stripEmojis(text){
  return (text || '')
    .replace(/[\u{1F1E6}-\u{1F1FF}\u{1F300}-\u{1FAFF}\u{2600}-\u{27BF}\u{2B00}-\u{2BFF}\u{2190}-\u{21FF}\u{FE0F}\u{200D}\u{2022}]/gu, '')
    .replace(/\s{2,}/g, ' ')
    .trim();
}
// Estimation prudente du temps de lecture d'un texte, pour ne JAMAIS couper
// la voix en pleine phrase, peu importe la longueur du message : ~2,5
// mots/seconde (débit posé) + marge de sécurité fixe.
function estimateSpeechMs(text){
  const words = (text || '').trim().split(/\s+/).filter(Boolean).length;
  return Math.max(1500, words * 400) + 1500;
}
// Découpe un texte en phrases courtes : les navigateurs (Chrome en tête)
// ont un bug connu où une lecture vocale continue s'arrête SILENCIEUSEMENT
// au bout d'environ 15 secondes sur un texte trop long. En lisant phrase
// par phrase et en enchaînant nous-mêmes, on contourne complètement ce bug,
// quelle que soit la longueur du message.
function splitIntoSpeechChunks(text, maxLen){
  maxLen = maxLen || 170;
  const sentences = (text || '').match(/[^.!?]+[.!?]*\s*/g) || [text || ''];
  const chunks = [];
  let current = '';
  sentences.forEach(s => {
    if(current && (current + s).length > maxLen){
      chunks.push(current.trim());
      current = s;
    } else {
      current += s;
    }
  });
  if(current.trim()) chunks.push(current.trim());
  return chunks.filter(c => c.length > 0).length ? chunks.filter(c => c.length > 0) : [text || ''];
}
// Filet supplémentaire : on garde une référence permanente vers l'énoncé en
// cours de lecture. Sans ça, certains navigateurs (Chrome en tête) peuvent
// "nettoyer" (garbage collector) l'objet en pleine lecture et couper le son
// sans aucune erreur — c'est ce qui provoque la voix qui s'arrête au bout
// de quelques messages sans prévenir.
let currentUtterance = null;
// Jeton de génération : si une nouvelle lecture démarre pendant qu'une
// ancienne est encore "en vol" (annulée mais dont les évènements arrivent
// en retard), les callbacks de l'ancienne deviennent inoffensifs.
let speechToken = 0;
function speak(text, onend){
  if(!voiceEnabled || !window.speechSynthesis){ if(onend) onend(); return; }
  const myToken = ++speechToken;
  speechSynthesis.cancel();
  const clean = stripEmojis(text);
  const chunks = splitIntoSpeechChunks(clean);
  let i = 0;
  let done = false;
  const finish = () => {
    if(myToken !== speechToken || done) return;
    done = true;
    speechUnlocked = true;
    currentUtterance = null;
    if(onend) onend();
  };
  function speakNext(){
    if(myToken !== speechToken) return; // une lecture plus récente a pris le relais
    if(i >= chunks.length){ finish(); return; }
    const utter = new SpeechSynthesisUtterance(chunks[i]);
    utter.lang = 'fr-FR';
    if (frVoice) utter.voice = frVoice;
    utter.volume = 1;   // volume maximal
    utter.rate = 1;
    utter.pitch = 1;
    currentUtterance = utter; // référence gardée en vie tant que ce morceau parle
    let chunkDone = false;
    const nextChunk = () => {
      if(myToken !== speechToken || chunkDone) return;
      chunkDone = true;
      clearTimeout(watchdog);
      i++;
      speakNext();
    };
    utter.onend = nextChunk;
    utter.onerror = nextChunk;
    // Filet PAR PHRASE : si ce morceau reste bloqué (bug ponctuel du moteur
    // vocal du navigateur), on passe quand même au suivant au lieu de
    // figer toute la voix off pour le reste de la projection.
    const watchdog = setTimeout(nextChunk, estimateSpeechMs(chunks[i]) + 4000);
    speechSynthesis.speak(utter);
  }
  // Petit délai après cancel() : contourne un bug connu où Chrome ignore un
  // speak() lancé dans le même tick qu'un cancel().
  setTimeout(() => { if(myToken === speechToken) speakNext(); }, 50);
}
function speakIntroText(){
  const introEl = document.getElementById('introMessage');
  const introText = introEl ? introEl.textContent.replace(/\s+/g,' ').trim() : '';
  return `Aujourd'hui, nous célébrons Sarah. ${introText}`;
}
function buildMessageSpeechText(m){
  return `Message de ${m.prenom}${m.nom ? ' ' + m.nom : ''}. ${(m.message||'').replace(/<[^>]*>/g,' ')}`;
}
// Relit ce qui est actuellement affiché à l'écran (accueil ou message en
// cours) — utilisé au démarrage et lors du déblocage audio.
function speakCurrent(){
  if(!voiceEnabled) return;
  if (phase === 'intro' || phase === 'waiting'){
    speak(speakIntroText());
  } else {
    const m = messages[msgIdx];
    if (m) speak(buildMessageSpeechText(m));
  }
}
// Les navigateurs exigent un geste humain avant d'autoriser le son : on
// écoute donc la toute première interaction, quelle qu'elle soit, pour
// débloquer et relancer la voix automatiquement — sans que l'utilisateur
// ait besoin de cliquer spécifiquement sur le bouton voix.
function unlockSpeechOnce(){
  if (speechUnlocked || !voiceEnabled) return;
  speechUnlocked = true;
  // Si la voix parle déjà normalement (l'autoplay a fonctionné dès le
  // chargement), ne surtout pas relancer la lecture en cours depuis le
  // début : ça la couperait en plein milieu pour la faire recommencer.
  // On ne se sert de ce "déblocage" que si aucun son n'est réellement en
  // train de jouer (cas où le navigateur a bloqué l'autoplay).
  if (window.speechSynthesis && (speechSynthesis.speaking || speechSynthesis.pending)) return;
  speakCurrent();
}
['click','touchstart','keydown'].forEach(evt=>{
  document.addEventListener(evt, unlockSpeechOnce, { once:true, passive:true });
});
function toggleVoice(){
  voiceEnabled = !voiceEnabled;
  const btn = document.getElementById('voiceBtn');
  if (btn){
    btn.textContent = voiceEnabled ? '🔊' : '🔇';
    btn.title = voiceEnabled ? 'Couper la voix off' : 'Activer la voix off';
  }
  if (!voiceEnabled && window.speechSynthesis){
    speechToken++; // invalide toute lecture en cours / callbacks en retard
    currentUtterance = null;
    speechSynthesis.cancel();
    return;
  }
  speechUnlocked = true; // le clic sur le bouton est lui-même un geste utilisateur
  speakCurrent();
}

// Durée d'affichage adaptée à la longueur du message
const MSG_MIN     = 6000;    // min 6s
const MSG_MAX     = 20000;   // max 20s (un peu plus pour les très longs messages)
const MSG_PER_WORD = 320;     // 0.32s ajouté par mot
const MSG_BASE     = 3500;    // socle fixe

// Seuil de caractères à partir duquel on bascule en mode "compact"
// (nom plus petit, moins de marges) pour laisser toute la place au message
const COMPACT_THRESHOLD = 260;
// Taille de police minimale autorisée pour le message (en px), en dernier recours
const MIN_FONT_PX = 15;

/* ═══ BANDEAU DÉFILANT ═══
   Modifie librement ces phrases (ex: date, âge...). */
const TICKER_ITEMS = [
  '✦ SARAH FÊTE SON 1ER ANNIVERSAIRE',
  '🤍 MERCI POUR VOS MOTS SI DOUX',
  '✦ UN MOMENT À PARTAGER ENSEMBLE',
  '🎉 BON ANNIVERSAIRE SARAH',
];

/* Normalise un nom pour la comparaison : minuscules, accents retirés,
   espaces multiples ramenés à un seul, espaces de début/fin retirés.
   Ça évite qu'une photo ne s'affiche pas à cause d'un simple espace en trop
   ou d'un accent écrit différemment entre le formulaire et le code. */
function normalizeKey(s){
  return (s || '')
    .toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g, '') // enlève les accents
    .replace(/\s+/g, ' ')
    .trim();
}
const PHOTOS_INDEX = {};
Object.keys(PHOTOS).forEach(k => { PHOTOS_INDEX[normalizeKey(k)] = PHOTOS[k]; });

let messages = [];
let msgIdx = 0;
let timer = null;
let phase = 'intro'; // 'intro' | 'waiting' | 'messages' | 'end'
let introFired = false;

/* ═══ DÉMARRAGE ═══
   Ce bloc est placé tout en haut du script, avant le décor (particules,
   ticker), et entouré d'un try/catch : ainsi, boutons, voix off et défilement
   des messages démarrent TOUJOURS, même si un élément purement décoratif
   plus bas venait à planter (ce qui, avant, bloquait tout le reste du
   script et rendait les boutons inertes). */
try{
  const replayBtn = document.getElementById('replayBtn');
  const nextBtn    = document.getElementById('nextBtn');
  const prevBtn    = document.getElementById('prevBtn');
  const voiceBtn   = document.getElementById('voiceBtn');
  if(replayBtn) replayBtn.addEventListener('click', () => replayShow());
  if(nextBtn)   nextBtn.addEventListener('click', () => goNext());
  if(prevBtn)   prevBtn.addEventListener('click', () => goPrev());
  if(voiceBtn)  voiceBtn.addEventListener('click', () => toggleVoice());

  document.addEventListener('keydown', e=>{
    if(e.key==='ArrowRight'){ goNext(); }
    if(e.key==='ArrowLeft'){ goPrev(); }
    if(e.key==='f' || e.key==='F'){ document.documentElement.requestFullscreen && document.documentElement.requestFullscreen(); }
  });
  window.addEventListener('resize', ()=>{ if(typeof phase !== 'undefined' && phase==='messages') fitMessage(); });

  startShow();                    // l'intro démarre immédiatement, sans écran de chargement
  fetchMessages();                // les données arrivent en tâche de fond
  setInterval(fetchMessages, REFRESH_MS);
}catch(e){
  console.error('Erreur au démarrage de la projection :', e);
}

/* ═══ PARTICULES ═══ */
try{
  (function(){
    const cv = document.getElementById('canvas'), ctx = cv && cv.getContext('2d');
    if(!cv || !ctx) return; // pas de canvas/contexte -> on abandonne juste le décor, sans rien casser
    const cols = ['#e8809e','#c9527a','#fce8ef','rgba(255,255,255,.75)'];
    const P = [];
    function resize(){ cv.width = innerWidth; cv.height = innerHeight; }
    resize(); window.addEventListener('resize', resize);
    for(let i=0;i<70;i++) P.push({
      x:Math.random()*innerWidth, y:Math.random()*innerHeight,
      r:Math.random()*2.5+.4, vx:(Math.random()-.5)*.2, vy:(Math.random()-.5)*.2,
      col:cols[Math.floor(Math.random()*cols.length)],
      a:Math.random()*.4+.05, ph:Math.random()*Math.PI*2
    });
    (function draw(){
      try{
        ctx.clearRect(0,0,cv.width,cv.height);
        P.forEach(p=>{
          p.x+=p.vx; p.y+=p.vy; p.ph+=.012;
          if(p.x<0)p.x=cv.width; if(p.x>cv.width)p.x=0;
          if(p.y<0)p.y=cv.height; if(p.y>cv.height)p.y=0;
          ctx.globalAlpha = p.a*(0.5+0.5*Math.sin(p.ph));
          ctx.fillStyle = p.col;
          ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fill();
        });
      }catch(e){ /* le décor peut échouer sans jamais impacter la projection */ }
      requestAnimationFrame(draw);
    })();
  })();
}catch(e){
  console.error('Décor particules indisponible :', e);
}

/* ═══ TICKER ═══ */
try{
  (function initTicker(){
    const track = document.getElementById('tickerTrack');
    if(!track) return;
    const loop = [...TICKER_ITEMS, ...TICKER_ITEMS]; // doublé pour un défilement continu
    track.innerHTML = loop.map(t => `<span>${t}</span>`).join('');
  })();
}catch(e){
  console.error('Bandeau défilant indisponible :', e);
}

/* ═══ HELPERS ═══ */
function esc(s){
  const d = document.createElement('div');
  d.textContent = s || '';
  return d.innerHTML;
}
function getDur(text){
  const words = text ? text.trim().split(/\s+/).filter(Boolean).length : 1;
  return Math.min(MSG_MAX, Math.max(MSG_MIN, MSG_BASE + words*MSG_PER_WORD));
}
function setProgress(dur){
  const bar = document.getElementById('progressFill');
  bar.style.transition = 'none'; bar.style.width = '0%';
  requestAnimationFrame(()=>{ requestAnimationFrame(()=>{
    bar.style.transition = 'width '+dur+'ms linear';
    bar.style.width = '100%';
  });});
}
function showSlide(id){
  const target = document.getElementById(id);
  document.querySelectorAll('.slide').forEach(s=>{
    s.classList.remove('active');
    if(s !== target) s.style.opacity = '0'; // force le masquage réel, même si un ancien style inline traînait
  });
  target.style.opacity = '1';
  target.classList.add('active');
}

/* ═══ AJUSTEMENT AUTOMATIQUE DE LA TAILLE DU MESSAGE ═══
   Empêche un message (et sa photo éventuelle) de déborder de l'écran :
   on mesure l'espace réellement disponible, puis on réduit la police
   jusqu'à ce que tout tienne, sans jamais pousser le texte hors du cadre. */
function computeAvailableHeight(){
  const margin = 28; // marge de sécurité en bas
  let used = 90;       // bandeau du haut + un peu d'air

  const from = document.querySelector('.msg-from');
  used += from.getBoundingClientRect().height + 8;

  const name = document.getElementById('msgName');
  used += name.getBoundingClientRect().height + parseFloat(getComputedStyle(name).marginBottom || 0);

  const ornament = document.getElementById('msgOrnament');
  used += ornament.getBoundingClientRect().height + parseFloat(getComputedStyle(ornament).marginBottom || 0);

  const quoteIcon = document.getElementById('msgQuoteIcon');
  if(quoteIcon.style.display !== 'none'){
    used += quoteIcon.getBoundingClientRect().height + 4;
  }

  return Math.max(110, window.innerHeight - used - margin);
}

function fitMessage(){
  const el = document.getElementById('msgBody');
  el.style.maxHeight = computeAvailableHeight() + 'px';
  el.style.fontSize = ''; // repart de la taille CSS par défaut (clamp)
  let size = parseFloat(getComputedStyle(el).fontSize);
  let guard = 0;
  while(el.scrollHeight > el.clientHeight + 2 && size > MIN_FONT_PX && guard < 80){
    size -= 1;
    el.style.fontSize = size + 'px';
    guard++;
  }
}

/* ═══ AFFICHAGE D'UN MESSAGE ═══ */
function showMessage(idx){
  if(messages.length === 0) return;
  if(idx >= messages.length){
    // dernier message atteint : on s'arrête ici, pas de retour au début
    phase = 'end';
    if(timer) clearTimeout(timer);
    document.getElementById('progressFill').style.transition = 'none';
    document.getElementById('progressFill').style.width = '100%';
    return;
  }
  msgIdx = idx;
  const m = messages[msgIdx];
  const key = normalizeKey(m.prenom + ' ' + m.nom);
  const photo = PHOTOS_INDEX[key];
  const isLong = (m.message || '').length > COMPACT_THRESHOLD;

  const slideMsg = document.getElementById('slideMsg');
  slideMsg.classList.toggle('compact', isLong);
  document.getElementById('msgQuoteIcon').style.display = isLong ? 'none' : '';
  document.getElementById('msgName').style.fontSize = isLong ? 'clamp(1.5rem,3.4vw,2.4rem)' : '';
  document.getElementById('msgName').style.marginBottom = isLong ? '14px' : '';
  document.getElementById('msgOrnament').style.margin = isLong ? '0 auto 14px' : '';

  document.getElementById('msgName').textContent = m.prenom + (m.nom ? ' '+m.nom : '');
  document.getElementById('msgBody').innerHTML = esc(m.message);
  document.getElementById('msgCounter').textContent = (msgIdx+1)+' / '+messages.length;

  const ambient = document.getElementById('photoAmbient');
  const veil = document.getElementById('ambientVeil');
  const full = document.getElementById('photoFull');

  // La photo du message (ou celle de Sarah par défaut si l'invité n'en a
  // pas fourni) sert de fond plein écran, flouté et assombri, pour tout le
  // monde. Par-dessus, la couche "photo-full" affiche la MÊME photo en
  // entier, sans aucun recadrage : on est ainsi certain de toujours voir
  // tout le monde sur la photo (l'invité ET la personne qu'il tient dans
  // ses bras, par exemple), quel que soit le cadrage d'origine.
  const activePhoto = photo || SARAH_DEFAULT_PHOTO;
  ambient.style.backgroundImage = `url(${activePhoto})`;
  full.style.backgroundImage = `url(${activePhoto})`;
  // Cadrage du fond flouté (purement décoratif) : avec background-size:cover
  // sur un écran large, une photo VERTICALE (portrait) se fait énormément
  // zoomer et le haut/bas est massivement rogné. On détecte l'orientation
  // réelle et on remonte le point d'ancrage vers le haut pour les photos
  // portrait, pour un rendu plus harmonieux en arrière-plan (la photo nette
  // au premier plan, elle, n'est de toute façon jamais rognée).
  ambient.style.backgroundPosition = 'center 22%';
  const probe = new Image();
  probe.onload = () => {
    if (ambient.style.backgroundImage !== `url(${activePhoto})`) return; // photo déjà changée
    const isPortrait = probe.naturalHeight > probe.naturalWidth * 1.05;
    ambient.style.backgroundPosition = isPortrait ? 'center 12%' : 'center';
  };
  probe.src = activePhoto;
  ambient.classList.add('show');
  full.classList.add('show');
  veil.classList.add('show');

  const slide = document.getElementById('slideMsg');
  slide.style.opacity = '0';
  setTimeout(()=>{
    showSlide('slideMsg');
    requestAnimationFrame(()=>{ requestAnimationFrame(()=>{
      slide.style.opacity = '1';
      fitMessage();
    }); });
  }, phase==='intro' ? 0 : 500);

  phase = 'messages';
  if(timer) clearTimeout(timer);

  const advance = () => { showMessage(msgIdx+1); };

  if(voiceEnabled){
    const text = buildMessageSpeechText(m);
    // Le temps affiché à l'écran (barre de progression + délai d'avance)
    // s'aligne sur le temps de lecture réel du message (une fois les emoji
    // retirés), quelle que soit sa longueur — jamais sur le minutage
    // "lecture silencieuse" de getDur().
    const dur = Math.max(getDur(m.message), estimateSpeechMs(stripEmojis(text)));
    setProgress(dur);
    let advanced = false;
    const doAdvance = () => { if(advanced) return; advanced = true; advance(); };
    speak(text, doAdvance);
    // Filet de sécurité : si l'événement de fin de lecture ne se déclenche
    // pas (bug navigateur/OS), on avance quand même, mais seulement après
    // la durée estimée + marge, jamais avant la fin réelle de la lecture.
    timer = setTimeout(doAdvance, dur + 2500);
  } else {
    const dur = getDur(m.message);
    setProgress(dur);
    timer = setTimeout(advance, dur);
  }
}

function startShow(){
  document.getElementById('photoAmbient').classList.remove('show');
  document.getElementById('photoFull').classList.remove('show');
  document.getElementById('ambientVeil').classList.remove('show');
  showSlide('slideIntro');
  introFired = false;

  const goToMessages = () => {
    if(introFired) return;
    introFired = true;
    if(timer) clearTimeout(timer);
    if(messages.length > 0){
      showMessage(0);
    } else {
      phase = 'waiting';
      showSlide('slideEmpty');
    }
  };

  if(timer) clearTimeout(timer);
  if(voiceEnabled){
    const introText = speakIntroText();
    // On laisse au moins le temps de l'intro visuelle habituelle, mais on
    // attend surtout que la voix ait vraiment fini de parler avant
    // d'enchaîner sur le premier message.
    const dur = Math.max(INTRO_DURATION, estimateSpeechMs(introText));
    speak(introText, goToMessages);
    timer = setTimeout(goToMessages, dur + 2500); // filet de sécurité
  } else {
    timer = setTimeout(goToMessages, INTRO_DURATION);
  }
}

function replayShow(){
  if(timer) clearTimeout(timer);
  if (window.speechSynthesis) speechSynthesis.cancel();
  msgIdx = 0;
  phase = 'intro';
  document.getElementById('progressFill').style.transition = 'none';
  document.getElementById('progressFill').style.width = '0%';

  // Masquer instantanément (sans fondu) tous les écrans avant de relancer
  const slides = document.querySelectorAll('.slide');
  const ambient = document.getElementById('photoAmbient');
  const full = document.getElementById('photoFull');
  const veil = document.getElementById('ambientVeil');
  ambient.style.transition = 'none';
  ambient.classList.remove('show');
  full.style.transition = 'none';
  full.classList.remove('show');
  veil.style.transition = 'none';
  veil.classList.remove('show');
  slides.forEach(s=>{
    s.style.transition = 'none';
    s.classList.remove('active');
    s.style.opacity = '0';
  });

  // On laisse le navigateur peindre cet état "masqué sans transition"
  // avant de restaurer le fondu normal et de relancer l'intro.
  requestAnimationFrame(()=>{
    requestAnimationFrame(()=>{
      slides.forEach(s=>{ s.style.transition = ''; });
      ambient.style.transition = '';
      full.style.transition = '';
      veil.style.transition = '';
      startShow();
    });
  });
}

/* ═══ FETCH SUPABASE + CACHE LOCAL ═══ */
async function fetchMessages(){
  try{
    const res = await fetch(
      SUPABASE_URL + '/rest/v1/rsvp?select=prenom,nom,message,created_at&order=created_at.asc',
      { headers:{ apikey: SUPABASE_KEY, Authorization: 'Bearer '+SUPABASE_KEY } }
    );
    if(!res.ok) throw new Error('fetch failed');
    const data = await res.json();
    const withMsg = data.filter(r=>r.message && r.message.trim());
    localStorage.setItem(CACHE_KEY, JSON.stringify(withMsg));
    applyNewData(withMsg);
  }catch(e){
    const cached = localStorage.getItem(CACHE_KEY);
    if(cached) applyNewData(JSON.parse(cached));
  }
}

function applyNewData(newMsgs){
  const changed = JSON.stringify(newMsgs) !== JSON.stringify(messages);
  messages = newMsgs;
  if(introFired && phase === 'waiting' && messages.length > 0){
    showMessage(0);
  } else if(changed && phase === 'end' && msgIdx < messages.length - 1){
    // de nouveaux messages sont arrivés après l'arrêt : on reprend le défilement
    showMessage(msgIdx + 1);
  }
}

/* ═══ NAVIGATION MANUELLE (boutons + clavier) ═══ */
function goNext(){
  if(messages.length === 0) return;
  if(timer) clearTimeout(timer);
  if(phase === 'intro' || phase === 'waiting'){
    introFired = true;
    showMessage(0);
  } else {
    showMessage(msgIdx + 1);
  }
}
function goPrev(){
  if(messages.length === 0) return;
  if(phase === 'intro' || phase === 'waiting') return;
  if(timer) clearTimeout(timer);
  showMessage(Math.max(0, msgIdx - 1));
}

document.addEventListener('keydown', e=>{
  if(e.key==='ArrowRight'){ goNext(); }
  if(e.key==='ArrowLeft'){ goPrev(); }
  if(e.key==='f' || e.key==='F'){ document.documentElement.requestFullscreen && document.documentElement.requestFullscreen(); }
});
window.addEventListener('resize', ()=>{ if(phase==='messages') fitMessage(); });

</script>
